name: arXiv Daily Email

on:
  schedule:
    # 23:00 UTC == 07:00 (UTC+8, Beijing/Shanghai) the next day
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  run:
    environment: email-code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run and send email
        env:
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python arxiv_daily.py
