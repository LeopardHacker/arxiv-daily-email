name: arXiv Daily Email

on:
  schedule:
    # 23:00 UTC == 07:00 (UTC+8, Beijing/Shanghai) the next day
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # Avoid Node version deprecation warnings from GitHub-hosted actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: test ls
        run: ls -al

      - name: test ls ../
        run: ls -al ../

      - name: Run and send email
        env:
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          # Optional override, e.g.:
          # ARXIV_QUERY: 'cat:cs.CL AND submittedDate:[20260423 TO 20260423]'
          ARXIV_QUERY: ${{ secrets.ARXIV_QUERY }}
        run: python arxiv_daily.py

